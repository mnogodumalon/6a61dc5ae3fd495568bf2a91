<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>claude-react-base</title>
    <!-- LivingApps Web Components (Chrome: la-header-bar-widget, la-drawer, la-nav).
         Same-Origin unter dem LA-Host; im Vite-Dev läuft der Pfad über den
         /react-webcomponents-Proxy (sandbox.py patcht vite.config.ts).
         Bewusst als dynamisch eingehängtes Script statt <script type="module"
         src="/…">: vite build versucht absolute Modul-Pfade aufzulösen und
         bricht ab ("Failed to resolve … from index.html"), Inline-Classic-
         Scripts lässt es unangetastet. -->
    <script>
      var laLoader = document.createElement('script');
      laLoader.type = 'module';
      laLoader.src = '/react-webcomponents/current/loader.js';
      document.head.appendChild(laLoader);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
